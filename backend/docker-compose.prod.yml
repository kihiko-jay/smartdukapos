# DukaPOS — Production Docker Compose (PATCH E-02)
#
# Differences from docker-compose.yml (dev):
#   - api: uses built image, no source volume mount, 4 workers, no --reload
#   - postgres: no exposed port (internal only), named secret for password
#   - redis: password protected, no exposed port
#   - nginx: TLS termination proxy (configure certs separately)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: dukapos_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER:     dukapos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB:       dukapos_db
    # NOT exposing port 5432 externally — internal network only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dukapos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: dukapos_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    # NOT exposing port 6379 externally
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: dukapos-api:${APP_VERSION:-latest}
    container_name: dukapos_api_prod
    restart: unless-stopped
    # Run migrations before starting the API
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app
             --host 0.0.0.0 --port 8000
             --workers ${WORKERS:-4}
             --log-level ${LOG_LEVEL:-info}
             --no-access-log"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://dukapos:${POSTGRES_PASSWORD}@db:5432/dukapos_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
      - frontend
    # No volume mount — source is baked into image

  # ── Sync Agent ─────────────────────────────────────────────────────────────
  # Bridges local legacy POS DB → cloud backend.
  # Run as a SINGLE REPLICA only — the in-process concurrency locks are
  # not distributed; two instances would cause duplicate sync runs.
  sync-agent:
    build:
      context: ../sync-agent
      dockerfile: Dockerfile
      target: runtime
    image: dukapos-sync-agent:${APP_VERSION:-latest}
    container_name: dukapos_sync_agent_prod
    restart: unless-stopped
    env_file:
      - ../sync-agent/.env
    environment:
      - NODE_ENV=production
      - RETRY_QUEUE_PATH=/app/data/retry_queue.db
    volumes:
      - sync_data:/app/data          # SQLite retry queue + dead-letter db (persist across restarts)
      - sync_logs:/app/logs          # Agent log files
    # Sync agent only needs to reach the cloud API (outbound HTTPS)
    # and the local POS DB. It does NOT join the backend docker network
    # unless the cloud API is also running in this compose stack (dev/staging).
    # For production, set CLOUD_API_URL in sync-agent/.env to the external URL.
    depends_on:
      - api
    networks:
      - backend
    deploy:
      replicas: 1                    # NEVER scale above 1 — see note above

  nginx:
    image: nginx:1.25-alpine
    container_name: dukapos_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - frontend

networks:
  backend:
    internal: true      # DB and Redis not reachable from outside
  frontend:

volumes:
  postgres_data:
  sync_data:             # Persist SQLite retry queue + dead-letter db across container restarts
  sync_logs:             # Persist sync agent logs
