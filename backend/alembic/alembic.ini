# Alembic configuration — DukaPOS v4
# sqlalchemy.url is intentionally left blank; it is injected from
# app.core.config.settings in env.py so we never have credentials in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os  # Use os.pathsep

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
